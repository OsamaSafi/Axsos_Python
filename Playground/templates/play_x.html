<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>

    <style>
        .boxes {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
            width: 80%;
            margin: 0 auto;
        }

        .boxes .box {
            background-color: blue;
            width: 100px;
            height: 100px;
            border: 3px solid #000;
            box-shadow: 2px 2px 5px 5px rgba(128, 0, 128, 0.203);
        }

        h1 {
            text-align: center;
        }

    </style>
</head>

<body>
    <h1>Welcom !</h1>
    <div class="boxes">
        {% for i in range(times) %}
        <div class="box"></div>
        {% endfor %}
    </div>

</body>

</html>
